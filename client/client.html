<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Selector</title>
    <style>
        body { font-family: system-ui; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        input, select, button { display: block; width: 100%; padding: 8px; margin: 8px 0; }
        #status { padding: 8px; border-radius: 4px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        video { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Enter username</h2>
    <input type="text" id="username" placeholder="e.g. jan.kowalski">
    <button onclick="checkUser()">Check</button>

    <div id="status"></div>

    <div id="streams-section" style="display:none;">
        <h3>Select stream</h3>
        <select id="streamSelect" onchange="startAndPlay()"></select>
        <button onclick="stopStream()">Stop</button>
        <video id="video" controls onplay="handlePlay()"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const API_URL = 'http://localhost:8000';
        const HLS_URL = 'http://localhost:8080';
        let streams = [];
        let currentHls = null;

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'error' : 'success';
        }

        async function checkUser() {
            const username = document.getElementById('username').value.trim();

            if (!username) {
                showStatus('Please enter a username', true);
                return;
            }

            const response = await fetch(`${API_URL}/v1/users/${username}/streams`);

            if (!response.ok) {
                const error = await response.json();
                showStatus(`Error: ${error.detail}`, true);
                document.getElementById('streams-section').style.display = 'none';
                return;
            }

            const data = await response.json();
            streams = data.streams;
            showStatus(`User found: ${data.username}`);

            const select = document.getElementById('streamSelect');
            select.innerHTML = '';

            if (streams.length === 0) {
                select.innerHTML = '<option>No streams found</option>';
            } else {
                select.innerHTML = '<option value="" disabled selected>Choose a stream</option>';
                streams.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.id;
                    option.dataset.name = s.name;
                    option.textContent = s.name;
                    select.appendChild(option);
                });
            }

            document.getElementById('streams-section').style.display = 'block';
        }

        async function startAndPlay() {
            const select = document.getElementById('streamSelect');
            const streamId = select.value;
            if (!streamId) return;

            const streamName = select.options[select.selectedIndex].dataset.name;

            showStatus(`Starting stream ${streamName}...`);

            const response = await fetch(`${API_URL}/v1/streams/${streamId}/start`, {
                method: 'POST'
            });

            if (!response.ok) {
                const error = await response.json();
                if (error.detail !== 'Stream already running') {
                    showStatus(`Error: ${error.detail}`, true);
                    return;
                }
            }

            showStatus(`Stream ${streamName} is live`);
            playStream(streamName);
        }

        function playStream(streamName) {
            const video = document.getElementById('video');
            const streamUrl = `${HLS_URL}/live/${streamName}.m3u8`;

            if (currentHls) {
                currentHls.destroy();
            }

            if (Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(streamUrl);
                currentHls.attachMedia(video);
                video.play();
            } else {
                video.src = streamUrl;
                video.play();
            }
        }

        function handlePlay() {
            const select = document.getElementById('streamSelect');
            if (select.value && !currentHls) {
                startAndPlay();
            }
        }

        async function stopStream() {
            const select = document.getElementById('streamSelect');
            const streamId = select.value;
            if (!streamId) return;

            const streamName = select.options[select.selectedIndex].dataset.name;

            const response = await fetch(`${API_URL}/v1/streams/${streamId}/stop`, {
                method: 'POST'
            });

            if (response.ok) {
                showStatus(`Stream ${streamName} stopped`);
                document.getElementById('video').pause();
                if (currentHls) {
                    currentHls.destroy();
                    currentHls = null;
                }
            } else {
                const error = await response.json();
                showStatus(`Error: ${error.detail}`, true);
            }
        }
    </script>
</body>
</html>
