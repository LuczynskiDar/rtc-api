<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Selector</title>
    <style>
        body { font-family: system-ui; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        input, select, button { display: block; width: 100%; padding: 8px; margin: 8px 0; }
        #status { padding: 8px; border-radius: 4px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        video { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Enter username</h2>
    <input type="text" id="username" placeholder="e.g. jan.kowalski">
    <button onclick="checkUser()">Check</button>

    <div id="status"></div>

    <div id="streams-section" style="display:none;">
        <h3>Select stream</h3>
        <select id="streamSelect"></select>
        <button onclick="playSelectedStream()">Play</button>
        <video id="video" controls></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const API_URL = 'http://localhost:8000';
        let streams = [];

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'error' : 'success';
        }

        async function checkUser() {
            const username = document.getElementById('username').value.trim();

            if (!username) {
                showStatus('Please enter a username', true);
                return;
            }

            const response = await fetch(`${API_URL}/users/${username}/streams`);

            if (!response.ok) {
                const error = await response.json();
                showStatus(`Error: ${error.detail}`, true);
                document.getElementById('streams-section').style.display = 'none';
                return;
            }

            const data = await response.json();
            streams = data.streams;
            showStatus(`User found: ${data.username}`);

            const select = document.getElementById('streamSelect');
            select.innerHTML = '';

            if (streams.length === 0) {
                select.innerHTML = '<option>No streams found</option>';
            } else {
                streams.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.id;
                    option.textContent = `${s.title} (${s.status})`;
                    select.appendChild(option);
                });
            }

            document.getElementById('streams-section').style.display = 'block';
        }

        function playSelectedStream() {
            const streamId = document.getElementById('streamSelect').value;
            const video = document.getElementById('video');
            const streamUrl = `http://localhost:8080/live/${streamId}.m3u8`;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
            } else {
                video.src = streamUrl;
            }
        }
    </script>
</body>
</html>
