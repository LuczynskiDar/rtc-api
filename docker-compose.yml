services:
  postgres:
    image: postgres:16
    container_name: postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  srs:
    image: ossrs/srs:5
    container_name: srs
    ports:
      - "1935:1935"    # RTMP – for FFmpeg
      - "8080:8080"    # HTTP/HLS – for client
      - "1985:1985"    # HTTP API – for status/stats
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - srs_data:/usr/local/srs/objs

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data:
  srs_data: